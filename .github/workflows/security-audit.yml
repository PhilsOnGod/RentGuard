name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC re-scan to catch newly disclosed CVEs
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (lockfile frozen)
        run: bun install --frozen-lockfile

      - name: Run bun audit (fail on high/critical)
        run: bun audit --prod --audit-level=high

      # Belt-and-braces: npm audit reads the same registry advisories and
      # often surfaces issues even when bun's resolver disagrees.
      - name: Run npm audit (fail on high/critical)
        run: npx --yes better-npm-audit audit --level high --production
